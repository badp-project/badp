  <!-- Package name (smaller) -->
  <text x="90.5" y="78" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="bold" font-size="40" fill="white"
        letter-spacing="1">badp</text>

  <!-- Subtitle: "Bayesian Averaging" along bottom-left edge -->
  <text text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="400" font-size="9" fill="rgba(255,255,255,0.9)"
        letter-spacing="0.3"
        transform="rotate(32, 52, 172)"
        x="52" y="172">Bayesian Averaging</text>

  <!-- Subtitle: "for Dynamic Panels" along bottom-right edge -->
  <text text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="400" font-size="9" fill="rgba(255,255,255,0.9)"
        letter-spacing="0.3"
        transform="rotate(-32, 129, 172)"
        x="129" y="172">for Dynamic Panels</text>
</svg>
